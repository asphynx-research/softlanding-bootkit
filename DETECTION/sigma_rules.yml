title: SoftLanding UEFI Bootkit — VenHw Firmware Entry
id: asphynx-0001
status: stable
level: critical
description: Detects VenHw boot entry from SoftLanding DXE driver
author: ASPHYNX
date: 2026/06/28
logsource:
    product: linux
    service: efibootmgr
detection:
    keywords:
        - 'VenHw(99E275E7-75A0-4B37-A2E6-C5385E6C00CB)'
    condition: keywords
---
title: SoftLanding — EFI Artifacts on Disk
id: asphynx-0002
status: stable
level: critical
description: Detects mach_kernel or SystemVersion.plist in EFI
author: ASPHYNX
date: 2026/06/28
logsource:
    product: linux
    category: file_access
detection:
    selection:
        FileName|contains:
            - '/boot/efi/mach_kernel'
            - '/boot/efi/System/Library/CoreServices/SystemVersion.plist'
    condition: selection
---
