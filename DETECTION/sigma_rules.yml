title: SoftLanding — Deadman Switch Token
id: asphynx-0004
status: stable
level: critical
description: TeamPCP deadman switch token in traffic
author: ASPHYNX
date: 2026/06/28
logsource:
    category: proxy
detection:
    selection:
        c-useragent|contains: 'IfYouRevokeThisTokenItWillWipeTheComputerOfTheOwner'
    condition: selection
